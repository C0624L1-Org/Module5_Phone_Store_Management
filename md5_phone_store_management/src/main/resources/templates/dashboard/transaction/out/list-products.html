<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/fragments/navbar.css">
    <link rel="stylesheet" href="/css/fragments/sidebar.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/common/toast.css">
    <link rel="stylesheet" href="/css/common/pagination.css">
    <link rel="stylesheet" href="/css/common/layout.css">

    <style>
        .btn.disabled {
            pointer-events: none; /* Ngăn tương tác */
            cursor: not-allowed;
            opacity: 0.65;
        }

        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .table th, .table td {
            vertical-align: middle;
        }

        .btn-select {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-select:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .custom-btn-group .custom-btn {
            padding: 0.1rem 0.5rem;
            font-size: 0.75rem;
            height: 19px;
            line-height: 1.2;
            min-height: 0;
        }

        #filterForm .btn-outline-success.custom-btn,
        #filterForm .btn-primary.custom-btn {
            height: 38px;
            line-height: 1.5;
            padding: 0.375rem 0.75rem;
        }
    </style>
</head>
<body>
<!-- Hiển thị thông báo -->
<div th:replace="~{common/toast}"></div>

<!-- Nhúng navbar -->
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="content-wrapper">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

        <!-- Main content -->
        <div class="content-container">
            <div class="card shadow-sm">
                <div class="card-body border-bottom py-3">
                    <form class="row g-3 align-items-end" id="filterForm"
                          th:action="@{/dashboard/admin/transactions/search/out/product/{a}/{b}(a=${a},b=${b})}"
                          method="get">
                        <div class="col-md-3">
                            <label for="productName" class="form-label">Tên sản phẩm</label>
                            <input type="text" class="form-control" id="productName" name="nsp"
                                   placeholder="Nhập tên sản phẩm">
                        </div>

                        <div class="col-md-3 position-relative">
                            <label for="supplierSearch" class="form-label">Nhà cung cấp</label>
                            <input type="text" id="supplierSearch" name="nncc" class="form-control"
                                   placeholder="Nhập để tìm kiếm..." autocomplete="off">
                            <ul id="supplierList" class="list-group position-absolute w-100" style="display: none; z-index: 1000;">
                                <li th:each="supplier : ${supplier}"
                                    th:data-value="${supplier.name}"
                                    th:text="${supplier.name}"
                                    class="list-group-item list-group-item-action"></li>
                            </ul>
                        </div>

                        <!-- Số lượng -->
                        <!-- Số lượng -->
                        <div class="col-md-2 d-flex flex-column align-items-center">
                            <label class="form-label text-center w-100">Số lượng</label>
                            <div class="btn-group-vertical w-100 custom-btn-group" role="group">
                                <button type="button" class="btn btn-sm btn-outline-primary custom-btn"
                                        data-selected="false"
                                        onclick="setSortQuantity('u', this)">
                                    Tăng dần ↑
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary custom-btn"
                                        data-selected="false"
                                        onclick="setSortQuantity('d', this)">
                                    Giảm dần ↓
                                </button>
                            </div>
                            <input type="hidden" id="sl" name="sl" th:value="${sl}">
                        </div>

                        <!-- Giá -->
                        <div class="col-md-2 d-flex flex-column align-items-center">
                            <label class="form-label text-center w-100">Giá</label>
                            <div class="btn-group-vertical w-100 custom-btn-group" role="group">
                                <button type="button" class="btn btn-sm btn-outline-primary custom-btn"
                                        data-selected="false"
                                        onclick="setSortPrice('u', this)">
                                    Tăng dần ↑
                                </button>
                                <button type="button" class="btn btn-sm btn-outline-primary custom-btn"
                                        data-selected="false"
                                        onclick="setSortPrice('d', this)">
                                    Giảm dần ↓
                                </button>
                            </div>
                            <input type="hidden" id="g" name="g" th:value="${g}">
                        </div>
                        <!-- Còn hàng -->
                        <div class="col-md-1 d-flex flex-column align-items-center">
                            <label class="form-label"></label>
                            <div class="w-100">
                                <button type="button" class="btn btn-sm btn-outline-success custom-btn w-100"
                                        data-selected="false"
                                        onclick="setInStock('ch', '1', this)">
                                    Còn hàng ✔
                                </button>
                            </div>
                            <input type="hidden" id="ch" name="ch" th:value="${ch}">
                        </div>

                        <div class="col-md-1 d-flex flex-column align-items-center">
                            <label class="form-label"></label>
                            <div class="w-100">
                                <button type="submit" class="btn btn-sm btn-primary w-100 custom-btn">
                                    <i class="fas fa-search me-2"></i>Tìm kiếm
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
                    <!-- Product table -->
                    <div class="table-container">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                            <tr>
                                <th>Product ID</th>
                                <th>Tên sản phẩm</th>
                                <th>Giá sản phẩm</th>
                                <th>Bộ nhớ</th>
                                <th>Kích thước màn hình</th>
                                <th>Camera</th>
                                <th>Selfie</th>
                                <th>Tên nhà cung cấp</th>
                                <th>Số lượng tồn</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="product : ${listProducts}">
                                <td th:text="${product.productID}"></td>
                                <td th:text="${product.name ?: 'N/A'}"></td>
                                <td th:text="${product.sellingPrice != null ? #numbers.formatDecimal(product.sellingPrice, 0, 'COMMA', 0, 'POINT') + ' đ' : 'N/A'}"></td>
                                <td th:text="${product.storage ?: 'N/A'}"></td>
                                <td th:text="${product.screenSize ?: 'N/A'}"></td>
                                <td th:text="${product.camera ?: 'N/A'}"></td>
                                <td th:text="${product.selfie ?: 'N/A'}"></td>
                                <td th:text="${product.supplier.name ?: 'N/A'}"></td>

                                <td th:text="${product.stockQuantity == 0 ? 'Hết hàng' : product.stockQuantity}"
                                    th:classappend="${product.stockQuantity == 0} ? 'text-danger fw-bold' : ''">
                                </td>
                                <td>
                                    <a th:if="${action == 'add'}"
                                       th:href="@{/dashboard/admin/transactions/new/out/{id}(id=${product.productID})}"
                                       class="btn btn-sm btn-success"
                                       th:classappend="${product.stockQuantity == 0} ? 'disabled' : ''"
                                       th:attr="aria-disabled=${product.stockQuantity == 0}">
                                        <i class="fas fa-check me-2"></i> Chọn Thêm
                                    </a>


                                    <a th:if="${action == 'edit'}"
                                       th:href="${product.stockQuantity == 0} ? null : @{/dashboard/admin/transactions/Out/edit/{oldId}/{id}(oldId=${oldId},id=${product.productID})}"
                                       class="btn btn-sm"
                                       th:classappend="${product.stockQuantity == 0} ? 'btn-danger disabled' : (${pid == product.productID} ? 'btn-primary' : 'btn-success')"
                                       th:attr="aria-disabled=${product.stockQuantity == 0}"
                                       th:text="${product.stockQuantity == 0} ? 'Hết hàng' : (${pid == product.productID} ? 'Hiện tại' : 'Chọn Sửa')">
                                        <i class="fas fa-check me-2"></i>
                                    </a>


                                </td>

                            </tr>
                            <tr th:if="${#lists.isEmpty(listProducts)}">
                                <td colspan="9" class="text-center py-4">Không tìm thấy sản phẩm nào</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>


</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>


<!-- Nhúng script navbar -->
<div th:replace="~{fragments/navbar :: navbar-script}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-3-typeahead/4.0.2/bootstrap3-typeahead.min.js"></script>

<!--scrip xử lý drop lis sup-->
<script>
    function toggleSortButton(group, direction, button) {
        // Xác định nhóm nút và input tương ứng
        const buttons = document.querySelectorAll(`.custom-btn-group:nth-of-type(${group}) button`);
        const hiddenInput = group === 1 ? document.getElementById('sl') : document.getElementById('g');

        // Nếu nút hiện tại đang active thì bỏ active
        if (button.classList.contains('active')) {
            button.classList.remove('active');
            button.setAttribute('data-selected', 'false');
            hiddenInput.value = ''; // Xóa giá trị input
            return;
        }

        // Bỏ active tất cả các nút trong nhóm
        buttons.forEach(btn => {
            btn.classList.remove('active');
            btn.setAttribute('data-selected', 'false');
        });

        // Kích hoạt nút được chọn
        button.classList.add('active');
        button.setAttribute('data-selected', 'true');
        hiddenInput.value = direction;
    }

    // Sử dụng hàm chung cho cả hai nhóm
    function setSortQuantity(direction, button) {
        toggleSortButton(1, direction, button);
    }

    function setSortPrice(direction, button) {
        toggleSortButton(2, direction, button);
    }

    document.addEventListener("DOMContentLoaded", function () {
        // Xử lý supplier dropdown như trước
        let input = document.getElementById("supplierSearch");
        let list = document.getElementById("supplierList");
        let items = list.getElementsByTagName("li");

        input.addEventListener("focus", function () {
            list.style.display = "block";
        });

        input.addEventListener("input", function () {
            let searchText = this.value.toLowerCase();
            for (let item of items) {
                let text = item.textContent.toLowerCase();
                item.style.display = text.startsWith(searchText) ? "" : "none";
            }
        });

        for (let item of items) {
            item.addEventListener("click", function () {
                input.value = this.dataset.value;
                list.style.display = "none";
            });
        }

        document.addEventListener("click", function (event) {
            if (!input.contains(event.target) && !list.contains(event.target)) {
                list.style.display = "none";
            }
        });
    });
</script>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Handle product selection
        document.querySelectorAll('.select-product').forEach(button => {
            button.addEventListener('click', function () {
                const productId = this.getAttribute('data-product-id');
                const productName = this.getAttribute('data-product-name');
                const supplierId = this.getAttribute('data-supplier-id');
                const sellingPrice = this.getAttribute('data-price');
                const stockQuantity = this.getAttribute('data-stock');

                // Store selected product data in localStorage
                const selectedProduct = {
                    productId: productId,
                    productName: productName,
                    supplierId: supplierId,
                    sellingPrice: sellingPrice,
                    stockQuantity: stockQuantity
                };
                localStorage.setItem('selectedProduct', JSON.stringify(selectedProduct));

                // Redirect back to the export page
                window.location.href = '/dashboard/admin/warehouse/export';
            });
        });

        // Handle filter form submission
        document.getElementById('filterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const productName = document.getElementById('productName').value;
            const supplierID = document.getElementById('supplierID').value;
            const minStock = document.getElementById('minStock').value;
            const maxPrice = document.getElementById('maxPrice').value;

            // Build query string
            let query = '';
            if (productName) query += `productName=${encodeURIComponent(productName)}&`;
            if (supplierID) query += `supplierID=${encodeURIComponent(supplierID)}&`;
            if (minStock) query += `minStock=${encodeURIComponent(minStock)}&`;
            if (maxPrice) query += `maxPrice=${encodeURIComponent(maxPrice)}&`;
            query = query.slice(0, -1); // Remove trailing '&'

            // Redirect with query
            window.location.href = `/dashboard/admin/transactions/new/out/product?${query}`;
        });

        // Reset filters
        document.getElementById('resetFilters').addEventListener('click', function () {
            document.getElementById('filterForm').reset();
            window.location.href = '/dashboard/admin/transactions/new/out/product';
        });
    });
</script>
</body>
</html>
