<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách sản phẩm</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/fragments/navbar.css">
    <link rel="stylesheet" href="/css/fragments/sidebar.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/common/toast.css">
    <link rel="stylesheet" href="/css/common/pagination.css">
    <link rel="stylesheet" href="/css/common/layout.css">

    <style>
        .table-container {
            max-height: 500px;
            overflow-y: auto;
        }

        .table th, .table td {
            vertical-align: middle;
        }

        .btn-select {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-select:hover {
            background-color: #0056b3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        .btn-cancel {
            background-color: #6c757d;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }
    </style>
</head>
<body>
<!-- Hiển thị thông báo -->
<div th:replace="~{common/toast}"></div>

<!-- Nhúng navbar -->
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="content-wrapper">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

        <!-- Main content -->
        <div class="content-container">
            <div class="container-fluid py-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <ol class="breadcrumb">
                            <li class="breadcrumb-item"><a th:href="@{/dashboard/warehouse/inventory}">Dashboard</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/dashboard/admin/transactions/listOut}">Giao dịch Xuất kho</a></li>
                            <li class="breadcrumb-item"><a th:href="@{/dashboard/admin/transactions/new/out/0}">Thêm mới xuất kho</a></li>
                            <li class="breadcrumb-item active" aria-current="page">Chọn sản phẩm xuất</li>
                        </ol>
                    </ol>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="mb-0">
                        <i class="fas fa-boxes me-2"></i>Danh sách sản phẩm
                    </h5>
                    <a th:href="@{/dashboard/admin/warehouse/export}" class="btn btn-cancel">
                        <i class="fas fa-times me-2"></i>Hủy
                    </a>
                </div>

                <div class="card shadow-sm">
                    <!-- Filter section -->
                    <div class="card-body border-bottom py-3">
                        <form class="row g-3" id="filterForm">
                            <div class="col-md-3">
                                <label for="productName" class="form-label">Tên sản phẩm</label>
                                <input type="text" class="form-control" id="productName" name="productName"
                                       placeholder="Nhập tên sản phẩm">
                            </div>

                            <div class="col-md-3">
                                <label for="supplierID" class="form-label">Nhà cung cấp</label>
                                <input type="text" class="form-control" id="supplierID" name="supplierID"
                                       placeholder="Nhập ID nhà cung cấp">
                            </div>

                            <div class="col-md-2">
                                <label for="minStock" class="form-label">Số lượng tối thiểu</label>
                                <input type="number" class="form-control" id="minStock" name="minStock"
                                       placeholder="0">
                            </div>

                            <div class="col-md-2">
                                <label for="maxPrice" class="form-label">Giá tối đa</label>
                                <input type="number" class="form-control" id="maxPrice" name="maxPrice"
                                       placeholder="0">
                            </div>

                            <div class="col-md-2 d-flex align-items-end">
                                <div class="btn-group w-100">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-search me-2"></i>Tìm kiếm
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="resetFilters">
                                        <i class="fas fa-times-circle me-2"></i>Xóa
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Product table -->
                    <!-- Product table -->
                    <div class="table-container">
                        <table class="table table-striped table-hover">
                            <thead class="table-dark">
                            <tr>
                                <th>Product ID</th>
                                <th>Tên sản phẩm</th>
                                <th>Bộ nhớ</th>
                                <th>Kích thước màn hình</th>
                                <th>Camera</th>
                                <th>Selfie</th>
                                <th>Tên nhà cung cấp</th>
                                <th>Số lượng tồn</th>
                                <th>Thao tác</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="product : ${listProducts}">
                                <td th:text="${product.productID}"></td>
                                <td th:text="${product.name ?: 'N/A'}"></td>
                                <td th:text="${product.storage ?: 'N/A'}"></td>
                                <td th:text="${product.screenSize ?: 'N/A'}"></td>
                                <td th:text="${product.camera ?: 'N/A'}"></td>
                                <td th:text="${product.selfie ?: 'N/A'}"></td>
                                <td th:text="${product.supplier.name ?: 'N/A'}"></td>
                                <td th:text="${product.stockQuantity}"></td>
                                <td>

                                    <a th:href="@{/dashboard/admin/transactions/new/out/{id}(id=${product.productID})}"
                                       class="btn btn-sm btn-success">
                                        <i class="fas fa-check me-2"></i> Chọn
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(listProducts)}">
                                <td colspan="9" class="text-center py-4">Không tìm thấy sản phẩm nào</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>


<!-- Nhúng script navbar -->
<div th:replace="~{fragments/navbar :: navbar-script}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        // Handle product selection
        document.querySelectorAll('.select-product').forEach(button => {
            button.addEventListener('click', function () {
                const productId = this.getAttribute('data-product-id');
                const productName = this.getAttribute('data-product-name');
                const supplierId = this.getAttribute('data-supplier-id');
                const sellingPrice = this.getAttribute('data-price');
                const stockQuantity = this.getAttribute('data-stock');

                // Store selected product data in localStorage
                const selectedProduct = {
                    productId: productId,
                    productName: productName,
                    supplierId: supplierId,
                    sellingPrice: sellingPrice,
                    stockQuantity: stockQuantity
                };
                localStorage.setItem('selectedProduct', JSON.stringify(selectedProduct));

                // Redirect back to the export page
                window.location.href = '/dashboard/admin/warehouse/export';
            });
        });

        // Handle filter form submission
        document.getElementById('filterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const productName = document.getElementById('productName').value;
            const supplierID = document.getElementById('supplierID').value;
            const minStock = document.getElementById('minStock').value;
            const maxPrice = document.getElementById('maxPrice').value;

            // Build query string
            let query = '';
            if (productName) query += `productName=${encodeURIComponent(productName)}&`;
            if (supplierID) query += `supplierID=${encodeURIComponent(supplierID)}&`;
            if (minStock) query += `minStock=${encodeURIComponent(minStock)}&`;
            if (maxPrice) query += `maxPrice=${encodeURIComponent(maxPrice)}&`;
            query = query.slice(0, -1); // Remove trailing '&'

            // Redirect with query
            window.location.href = `/dashboard/admin/transactions/new/out/product?${query}`;
        });

        // Reset filters
        document.getElementById('resetFilters').addEventListener('click', function () {
            document.getElementById('filterForm').reset();
            window.location.href = '/dashboard/admin/transactions/new/out/product';
        });
    });
</script>
</body>
</html>
