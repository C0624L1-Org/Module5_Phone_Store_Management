<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Danh sách Giao dịch Xuất kho</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/fragments/navbar.css">
    <link rel="stylesheet" href="/css/fragments/sidebar.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/common/toast.css">
    <link rel="stylesheet" href="/css/common/pagination.css">
    <link rel="stylesheet" href="/css/common/layout.css">

    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .chart-container {
            width: 90%;
            margin: 30px auto;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chart-wrapper {
            width: 100%;
            height: 400px; /* Tăng chiều cao của chart */
            position: relative;
            margin-top: 20px;
        }

        .chart-buttons {
            margin: 20px 0;
        }

        .chart-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        /* Đảm bảo canvas sử dụng toàn bộ không gian có sẵn */
        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>
<!-- Hiển thị thông báo -->
<div th:replace="~{common/toast}"></div>

<!-- Nhúng navbar -->
<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="content-wrapper">
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside th:replace="~{fragments/sidebar :: sidebar}"></aside>

        <!-- Main content -->
        <div class="content-container">
            <div class="container-fluid py-4">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item active" aria-current="page">Dashboard</li>
                    </ol>
                </nav>

                <!-- Chọn Nhập kho / Xuất kho -->
                <div class="mb-4">
                    <button class="btn btn-primary" th:onclick="|window.location.href='@{/dashboard/admin/transactions/listOut}'|">Nhập kho</button>
                    <button class="btn btn-secondary" th:onclick="|window.location.href='@{/dashboard/admin/transactions/listOut}'|">Xuất kho</button>
                </div>

                <!-- Tiêu đề chính -->
                <h1 class="text-center mb-4 fw-bold">Biểu đồ Thống kê Nhập Xuất Kho</h1>

                <div class="chart-container">
                    <div class="chart-buttons text-center">
                        <button class="btn btn-info btn-lg" onclick="showChart('myChart')">Tổng quan</button>
                        <button class="btn btn-primary btn-lg" onclick="showChart('importChart')">Chi tiết Nhập kho</button>
                        <button class="btn btn-danger btn-lg" onclick="showChart('exportChart')">Chi tiết Xuất kho</button>
                    </div>

                    <div class="chart-wrapper">
                        <canvas id="myChart"></canvas>
                        <canvas id="importChart" style="display:none;"></canvas>
                        <canvas id="exportChart" style="display:none;"></canvas>
                    </div>
                </div>

                <script>
                    // Hàm hiển thị biểu đồ được chọn và ẩn các biểu đồ khác
                    function showChart(chartId) {
                        document.getElementById('myChart').style.display = 'none';
                        document.getElementById('importChart').style.display = 'none';
                        document.getElementById('exportChart').style.display = 'none';
                        document.getElementById(chartId).style.display = 'block';
                    }

                    // Dữ liệu cho biểu đồ
                    // const months = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5'];
                    // const importData = [100, 200, 150, 300, 250];
                    // const exportData = [120, 180, 130, 280, 220];
                    // Dữ liệu cho biểu đồ
                    const months = ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6', 'Tháng 7', 'Tháng 8', 'Tháng 9', 'Tháng 10', 'Tháng 11', 'Tháng 12'];
                    const importData = [100, 200, 150, 300, 250, 400, 350, 450, 500, 600, 550, 700]; // Dữ liệu nhập kho cho 12 tháng
                    const exportData = [120, 180, 130, 280, 220, 300, 400, 350, 450, 500, 600, 650]; // Dữ liệu xuất kho cho 12 tháng

                    // Cấu hình chung cho biểu đồ
                    Chart.defaults.font.size = 14; // Tăng font size mặc định
                    Chart.defaults.color = '#333'; // Màu chữ đậm hơn

                    // Khởi tạo biểu đồ tổng quan
                    const ctx = document.getElementById('myChart').getContext('2d');
                    new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: months,
                            datasets: [
                                {
                                    label: 'Nhập kho',
                                    data: importData,
                                    backgroundColor: 'rgba(54, 162, 235, 0.7)',
                                    borderColor: 'rgba(54, 162, 235, 1)',
                                    borderWidth: 2
                                },
                                {
                                    label: 'Xuất kho',
                                    data: exportData,
                                    backgroundColor: 'rgba(255, 99, 132, 0.7)',
                                    borderColor: 'rgba(255, 99, 132, 1)',
                                    borderWidth: 2
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Số lượng',
                                        font: {
                                            size: 16,
                                            weight: 'bold'
                                        }
                                    },
                                    ticks: {
                                        font: {
                                            size: 14
                                        }
                                    }
                                },
                                x: {
                                    title: {
                                        display: true,
                                        text: 'Thời gian',
                                        font: {
                                            size: 16,
                                            weight: 'bold'
                                        }
                                    },
                                    ticks: {
                                        font: {
                                            size: 14
                                        }
                                    }
                                }
                            },
                            plugins: {
                                title: {
                                    display: true,
                                    text: 'So sánh Nhập/Xuất kho theo tháng',
                                    font: {
                                        size: 20,
                                        weight: 'bold'
                                    },
                                    padding: {
                                        top: 10,
                                        bottom: 20
                                    }
                                },
                                legend: {
                                    position: 'top',
                                    labels: {
                                        font: {
                                            size: 14,
                                            weight: 'bold'
                                        },
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // Khởi tạo biểu đồ nhập kho
                    const importCtx = document.getElementById('importChart').getContext('2d');
                    new Chart(importCtx, {
                        type: 'line',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'Nhập kho',
                                data: importData,
                                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                                borderColor: 'rgba(54, 162, 235, 1)',
                                borderWidth: 3,
                                tension: 0.3,
                                fill: true,
                                pointRadius: 6,
                                pointHoverRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Số lượng',
                                        font: {
                                            size: 16,
                                            weight: 'bold'
                                        }
                                    },
                                    ticks: {
                                        font: {
                                            size: 14
                                        }
                                    }
                                },
                                x: {
                                    title: {
                                        display: true,
                                        text: 'Thời gian',
                                        font: {
                                            size: 16,
                                            weight: 'bold'
                                        }
                                    },
                                    ticks: {
                                        font: {
                                            size: 14
                                        }
                                    }
                                }
                            },
                            plugins: {
                                title: {
                                    display: true,
                                    text: 'Chi tiết số lượng hàng hóa nhập kho theo tháng',
                                    font: {
                                        size: 20,
                                        weight: 'bold'
                                    },
                                    padding: {
                                        top: 10,
                                        bottom: 20
                                    }
                                },
                                legend: {
                                    position: 'top',
                                    labels: {
                                        font: {
                                            size: 14,
                                            weight: 'bold'
                                        },
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // Khởi tạo biểu đồ xuất kho
                    const exportCtx = document.getElementById('exportChart').getContext('2d');
                    new Chart(exportCtx, {
                        type: 'line',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'Xuất kho',
                                data: exportData,
                                backgroundColor: 'rgba(255, 99, 132, 0.5)',
                                borderColor: 'rgba(255, 99, 132, 1)',
                                borderWidth: 3,
                                tension: 0.3,
                                fill: true,
                                pointRadius: 6,
                                pointHoverRadius: 8
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    title: {
                                        display: true,
                                        text: 'Số lượng',
                                        font: {
                                            size: 16,
                                            weight: 'bold'
                                        }
                                    },
                                    ticks: {
                                        font: {
                                            size: 14
                                        }
                                    }
                                },
                                x: {
                                    title: {
                                        display: true,
                                        text: 'Thời gian',
                                        font: {
                                            size: 16,
                                            weight: 'bold'
                                        }
                                    },
                                    ticks: {
                                        font: {
                                            size: 14
                                        }
                                    }
                                }
                            },
                            plugins: {
                                title: {
                                    display: true,
                                    text: 'Chi tiết số lượng hàng hóa xuất kho theo tháng',
                                    font: {
                                        size: 20,
                                        weight: 'bold'
                                    },
                                    padding: {
                                        top: 10,
                                        bottom: 20
                                    }
                                },
                                legend: {
                                    position: 'top',
                                    labels: {
                                        font: {
                                            size: 14,
                                            weight: 'bold'
                                        },
                                        padding: 20
                                    }
                                }
                            }
                        }
                    });

                    // Hiển thị biểu đồ tổng quan khi trang được tải
                    document.addEventListener('DOMContentLoaded', function() {
                        showChart('myChart');
                    });
                </script>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer th:replace="~{fragments/footer :: footer}"></footer>

<!-- Nhúng script navbar -->
<div th:replace="~{fragments/navbar :: navbar-script}"></div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
