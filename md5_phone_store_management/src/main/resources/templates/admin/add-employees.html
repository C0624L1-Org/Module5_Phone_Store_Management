<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thêm Nhân viên - Hệ thống Quản lý Bán Điện thoại</title>
  <link rel="stylesheet" href="/css/styles.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        span{
            color: red;
        }
    </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <h1>PhoneShop</h1>
    </div>
    <nav>
      <ul>
        <li><a href="admin-index.html">Trang chủ</a></li>
        <li><a href="employees.html" class="active">Quản lý nhân viên</a></li>
        <li><a href="#">Quản lý sản phẩm</a></li>
        <li><a href="#">Quản lý đơn hàng</a></li>
        <li><a href="#">Báo cáo</a></li>
      </ul>
    </nav>
    <div class="user-info">
      <span>Admin</span>
      <img src="https://via.placeholder.com/40" alt="Avatar">
    </div>
  </header>

  <main>
    <div class="page-header">
      <h2>Thêm Nhân viên Mới</h2>
      <a th:href="@{/admin}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Quay lại
      </a>
    </div>

    <div class="form-container">
      <form id="addEmployeeForm" th:action="@{/admin/employees/create}" method="post" th:object="${employeeDTO}">
        <div class="form-row">
          <div class="form-group">
            <label for="fullName">Họ ten</label>
            <input th:field="*{fullName}" type="text" id="fullName" name="fullName" >
            <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="username">Ten dang nhap</label>
            <input th:field="*{username}" type="text" id="username" name="username" >
            <span th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input th:field="*{phone}" type="tel" id="phone" name="phone"  placeholder="0912345678" >
            <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></span>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input th:field="*{email}" type="email" id="email" name="email" placeholder="example@email.com" >
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="department">Phòng ban</label>
            <select th:field="*{role}" id="department" name="department" >
<!--              <option th:value="">Chọn phòng ban</option>-->
              <option th:value="SalesStaff">Nhân viên kinh doanh</option>
              <option th:value="SalesPerson">Nhân viên bán hàng</option>
              <option th:value="WarehouseStaff">Nhân viên thủ kho</option>
            </select>

          </div>
          <div class="form-group">
            <label for="birthday">Birthday</label>
            <input th:field="*{dob}" type="date" id="birthday" name="birthday" >
            <span th:if="${#fields.hasErrors('dob')}" th:errors="*{dob}"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="address">Địa chỉ</label>
          <textarea th:field="*{address}" id="address" name="address" rows="3"></textarea>
           <span th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></span>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input th:field="*{password}" type="password" id="password" name="password" >
            <span th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
          </div>
<!--          <div class="form-group">-->
<!--            <label for="confirmPassword">Xác nhận mật khẩu</label>-->
<!--            <input type="password" id="confirmPassword" name="confirmPassword" required>-->
<!--          </div>-->
        </div>

<!--        <div class="form-group">-->
<!--          <label for="avatar">Ảnh đại diện</label>-->
<!--          <input type="file" id="avatar" name="avatar" accept="image/*">-->
<!--        </div>-->

        <div class="form-actions">
          <button type="reset" class="btn btn-secondary">Làm mới</button>
          <button type="submit" class="btn btn-primary">Thêm nhân viên</button>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>&copy; 2024 Hệ thống Quản lý Bán Điện thoại. Đã đăng ký bản quyền.</p>
  </footer>
</div>
