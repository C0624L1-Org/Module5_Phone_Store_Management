<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Danh sách Khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/dashboard/dashboard.css">
    <link rel="stylesheet" href="/css/fragments/navbar.css">
    <link rel="stylesheet" href="/css/fragments/footer.css">
    <link rel="stylesheet" href="/css/fragments/sidebar.css">
    <link rel="stylesheet" href="/css/common/toast.css">
    <link rel="stylesheet" href="/css/common/pagination.css">
    <style>
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /*background-color: rgba(0, 0, 0, 0.5); !* Màu nền tối *!*/
            background-color: rgba(0, 0, 0, 0.7); /* Màu nền tối */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000; /* Đảm bảo modal nằm trên các phần tử khác */
        }

        .modal-dialog {
            background-color: white; /* Màu nền của modal */
            border-radius: 5px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        #search-form {
            display: grid;
            grid-template-columns: auto 1fr auto auto;
            gap: 10px;
        }
    </style>
</head>
<body>
<!-- Hiển thị thông báo -->
<div th:replace="~{common/toast}"></div>
<!-- Nhúng navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>
<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>
<div class="main-content mt-5">
    <table>
        <tr>
            <td>
                <div class="bg-gray-200 py-2 px-4">
                    <h1 class="text-lg font-bold mb-2">Danh sách Khách hàng</h1>
                    <div style="display: flex; align-items: center; justify-content: space-between; border-radius: 9999px; padding: 0.5rem; background-color: white; width: 100%; white-space: nowrap;">
                        <form action="/dashboard/admin/customers/search" method="get" id="search-form"
                              style="display: flex; align-items: center; gap: 0.5rem; width: 100%;">
                            <select id="search-type" name="search-type"
                                    style="border-radius: 0.25rem; padding: 0.25rem 0.5rem; flex-shrink: 0;">
                                <option value="name">Tìm Theo Tên</option>
                                <option value="phone">Tìm Theo Số Điện Thoại</option>
                                <option value="email">Tìm Theo Email</option>
                                <option value="gender">Tìm Theo Giới Tính</option>
                            </select>
                            <input type="text" id="search-input" name="keyWord" placeholder="Nhập thông tin tìm kiếm"
                                   style="border-radius: 0.25rem; padding: 0.25rem 0.5rem; flex-grow: 1; min-width: 0;"/>
                            <button type="submit" id="search-button"
                                    style="background-color: #3B82F6; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; flex-shrink: 0;">
                                Tìm
                            </button>
                        </form>
                        <div style="display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;">
                            <button type="button" id="refresh-button"
                                    style="background-color: #6B7280; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px; margin-left: 40rem;"
                                    onclick="window.location.href='/dashboard/admin/customers/list'">
                                Làm mới
                            </button>
                            <button type="button" class="bg-green-600 text-white py-1 px-3 rounded-full" id="add-button"
                                    onclick="showAddCustomerForm()"
                                    style="background-color: #22C55E; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px;">
                                Thêm mới
                            </button>
                            <form th:action="@{/dashboard/admin/customers/delete}" method="post" id="delete-form"
                                  onsubmit="return validateDelete()" style="flex-shrink: 0;">
                                <input type="hidden" name="ids" id="ids"/>
                                <button type="submit"
                                        style="background-color: #EF4444; color: white; padding: 0.25rem 0.75rem; border-radius: 9999px;"
                                        id="delete-button">Xóa
                                </button>
                            </form>
                        </div>
                    </div>
                    <div class="border border-secondary rounded">
                        <!-- Phần tiêu đề cố định -->
                        <div class="bg-white">
                            <table class="table table-bordered">
                                <thead class="thead-light">
                                <tr>
                                    <th>Chọn</th>
                                    <th>ID</th>
                                    <th>Họ tên</th>
                                    <th>Ngày sinh / Tuổi</th>
                                    <th>Địa chỉ</th>
                                    <th>Số điện thoại</th>
                                    <th>Email</th>
                                    <th>Giới Tính</th>
                                    <th>Hành động</th>
                                </tr>
                                </thead>
                            </table>
                        </div>

                        <!-- Phần thân có thanh cuộn -->
                        <div class="table-responsive" style="max-height: 320px; overflow-y: auto;">
                            <table class="table table-bordered">
                                <tbody id="customer-table-body">
                                <tr th:each="customer : ${customers}">
                                    <td>
                                        <input type="checkbox" name="ids" th:value="${customer.customerID}" class="customer-checkbox"
                                               th:data-name="${customer.fullName}" />
                                    </td>
                                    <td th:text="${customer.customerID}"></td>
                                    <td th:text="${customer.fullName}"></td>
                                    <td th:text="${#dates.format(customer.dob, 'dd-MM-yyyy') + ' ( ' +
                        T(java.time.Period).between(customer.dob.toLocalDate(), T(java.time.LocalDate).now()).getYears() + ' )'}"></td>
                                    <td th:text="${customer.address}"></td>
                                    <td th:text="${customer.phone}"></td>
                                    <td th:text="${customer.email}"></td>
                                    <td th:text="${customer.gender}"></td>
                                    <td>
                                        <a th:href="@{/dashboard/admin/customers/edit/{id}(id=${customer.customerID})}"
                                           class="btn btn-warning btn-sm">
                                            Sửa
                                        </a>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>




                </div>
            </td>
        </tr>
    </table>
</div>



<!-- Nhúng footer -->
<div th:replace="~{fragments/footer :: footer}"></div>
<!-- Nhúng script navbar -->
<div th:replace="~{fragments/navbar :: navbar-script}"></div>
<!-- Các script khác -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function validateDelete() {
        const checkboxes = document.querySelectorAll('input[name="ids"]:checked');
        if (checkboxes.length === 0) {
            alert('Vui lòng chọn khách hàng cần xóa');
            return false; // Ngăn form gửi yêu cầu
        }
        const ids = Array.from(checkboxes).map(checkbox => checkbox.value);
        document.getElementById('ids').value = ids.join(','); // Gán giá trị vào trường ẩn
        const customerDetails = Array.from(checkboxes).map(checkbox => {
            const name = checkbox.getAttribute('data-name');
            const phone = checkbox.closest('tr').querySelector('td:nth-child(6)').innerText;
            return `${name} (SĐT: ${phone})`;
        });
        const customerList = customerDetails.join(', ');
        const confirmationMessage = `Bạn có chắc chắn muốn xóa các khách hàng: ${customerList} không?`;
        return confirm(confirmationMessage);
    }

    // Đổi sreach theo box hoặc string
    document.getElementById("search-type").addEventListener("change", function () {
        let inputContainer = document.getElementById("input-container");
        inputContainer.innerHTML = ""; // Xóa nội dung cũ
        if (this.value === "gender") {
            // Tạo checkbox
            inputContainer.innerHTML = `
                <label><input type="radio" name="keyWord" value="male"> Nam</label>
                <label><input type="radio" name="keyWord" value="female"> Nữ</label>
                <label><input type="radio" name="keyWord" value="other"> Khác</label>
            `;
        } else {
            // Trả về ô input text
            inputContainer.innerHTML = `
                <input type="text" id="search-input" name="keyWord" placeholder="Nhập thông tin tìm kiếm"
                       class="border border-gray-300 rounded px-2 py-1"/>
            `;
        }
    });
</script>

<!-- Modal Sửa Khách Hàng -->
<div id="editCustomerModal" class="modal" tabindex="-1" role="dialog" style="display: none;">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Sửa Khách Hàng</h5>
                <button type="button" class="close" onclick="closeEditCustomerModal()">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="edit-customer-form" th:action="@{/dashboard/admin/customers/update}" method="post">
                    <input type="hidden" id="editCustomerID" name="customerID"/>
                    <div class="mb-4">
                        <label for="edit-full-name" class="block text-sm font-medium text-gray-700">Họ tên:</label><br>
                        <input type="text" id="edit-full-name" name="fullName"
                               class="border border-gray-300 rounded px-2 py-1" required/>
                    </div>
                    <div class="mb-4">
                        <label for="edit-dob" class="block text-sm font-medium text-gray-700">Ngày sinh:</label><br>
                        <input type="date" id="edit-dob" name="dob" class="border border-gray-300 rounded px-2 py-1"
                               required/>
                    </div>
                    <div class="mb-4">
                        <label for="edit-phone" class="block text-sm font-medium text-gray-700">Số điện
                            thoại:</label><br>
                        <input type="text" id="edit-phone" name="phone" class="border border-gray-300 rounded px-2 py-1"
                               required/>
                    </div>
                    <div class="mb-4">
                        <label for="edit-address" class="block text-sm font-medium text-gray-700">Địa chỉ:</label><br>
                        <input type="text" id="edit-address" name="address"
                               class="border border-gray-300 rounded px-2 py-1"/>
                    </div>
                    <div class="mb-4">
                        <label for="edit-email" class="block text-sm font-medium text-gray-700">Email:</label><br>
                        <input type="email" id="edit-email" name="email"
                               class="border border-gray-300 rounded px-2 py-1" required/>
                    </div>
                    <div class="mb-4">
                        <label for="edit-gender" class="block text-sm font-medium text-gray-700">Giới tính:</label><br>
                        <select id="edit-gender" name="gender" class="border border-gray-300 rounded px-2 py-1">
                            <option value="Male">Nam</option>
                            <option value="Female">Nữ</option>
                            <option value="Other">Khác</option>
                        </select>
                    </div>
                    <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
                        <button type="submit" class="bg-blue-600 text-white py-1 px-4 rounded">Cập nhật</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<!-- Modal Thêm Khách Hàng -->
<div id="addCustomerModal" class="modal" tabindex="-1" role="dialog" style="display: none;">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Thêm Khách Hàng</h5>
                <button type="button" class="close" onclick="closeAddCustomerModal()">
                    <span>&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="add-customer-form" th:action="@{/dashboard/admin/customers/create}" method="post">
                    <div class="mb-4">
                        <label for="full-name" class="block text-sm font-medium text-gray-700">Họ tên:</label><br>
                        <input type="text" id="full-name" name="fullName"
                               class="border border-gray-300 rounded px-2 py-1" required/>
                    </div>
                    <div class="mb-4">
                        <label for="dob" class="block text-sm font-medium text-gray-700">Ngày sinh:</label><br>
                        <input type="date" id="dob" name="dob" class="border border-gray-300 rounded px-2 py-1"
                               required/>
                    </div>
                    <div class="mb-4">
                        <label for="phone" class="block text-sm font-medium text-gray-700">Số điện thoại:</label><br>
                        <input type="text" id="phone" name="phone" class="border border-gray-300 rounded px-2 py-1"
                               required/>
                    </div>
                    <div class="mb-4">
                        <label for="address" class="block text-sm font-medium text-gray-700">Địa chỉ:</label><br>
                        <input type="text" id="address" name="address"
                               class="border border-gray-300 rounded px-2 py-1"/>
                    </div>
                    <div class="mb-4">
                        <label for="email" class="block text-sm font-medium text-gray-700">Email:</label><br>
                        <input type="email" id="email" name="email" class="border border-gray-300 rounded px-2 py-1"
                               required/>
                    </div>
                    <div class="mb-4">
                        <label for="gender" class="block text-sm font-medium text-gray-700">Giới tính:</label><br>
                        <select id="gender" name="gender" class="border border-gray-300 rounded px-2 py-1">
                            <option value="Male">Nam</option>
                            <option value="Female">Nữ</option>
                            <option value="Other">Khác</option>
                        </select>
                    </div>
                    <input type="hidden" name="purchaseCount" value="0"/>
                    <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
                        <button type="submit" class="bg-blue-600 text-white py-1 px-4 rounded">Thêm mới</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script>
    function showAddCustomerForm() {
        document.getElementById('addCustomerModal').style.display = 'block';
        document.body.style.overflow = 'hidden'; // Ngăn cuộn trang khi modal mở
    }

    function closeAddCustomerModal() {
        document.getElementById('addCustomerModal').style.display = 'none';
        document.body.style.overflow = 'auto'; // Cho phép cuộn trang khi modal đóng
    }
</script>

    document.getElementById('add-customer-form').addEventListener('submit', function (event) {
        event.preventDefault(); // Ngăn chặn hành động gửi form mặc định

        const formData = new FormData(this); // Lấy dữ liệu từ form

        fetch(this.action, {
            method: 'POST',
            body: formData,
        })
            .then(response => {
                if (response.redirected) {
                    window.location.href = response.url;
                } else {
                    return response.json();
                }
            })
            .then(data => {
                if (data && !data.success) {
                    alert('Lỗi khi thêm khách hàng: ' + data.message);
                }
            })
            .catch(error => console.error('Lỗi:', error));
    });
