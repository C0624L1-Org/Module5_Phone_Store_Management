<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPT Shop Header</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        .hidden { display: none; }
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: left;
            width: 300px;
        }
        .close-btn {
            cursor: pointer;
            background: red;
            color: white;
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            float: right;
        }
        .tab-buttons button {
            width: 50%;
            padding: 10px;
            border: none;
            background: lightgray;
            cursor: pointer;
        }
        .tab-buttons .active {
            background: red;
            color: white;
        }
        .container{
            width: 100%;
            max-width: 100%;

        }
    </style>
</head>
<body>
<header class="bg-red-600 shadow-effect">
    <div class="container mx-auto flex items-center justify-between py-2 px-4">
        <div class="flex items-center">
            <img alt="FPT Shop logo" class="h-10" height="40"
                 src="https://storage.googleapis.com/a1aa/image/_DnrG2agcom7C6J491WfQqChZ5rJqr9sQNqU0Bb_6eE.jpg"
                 width="100"/>
        </div>
        <div class="flex items-center space-x-4">
            <button id="open-modal" class="bg-red-700 text-white px-4 py-2 rounded-full hover-effect">
                Danh mục
            </button>
            <div class="relative">
                <input class="w-96 px-4 py-2 rounded-full border border-gray-300 focus:border-blue-200"
                       placeholder="Nhập tên điện thoại, máy tính, phụ kiện... cần tìm" type="text"/>
                <button class="absolute right-0 top-0 mt-2 mr-2 text-red-600">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="flex items-center space-x-2 relative">
                <button id="user-icon" class="text-white">
                    <i class="fas fa-user-circle"></i>
                </button>
                <button class="bg-black text-white px-4 py-2 rounded-full hover-effect">
                    Giỏ hàng
                </button>
            </div>
        </div>
    </div>
</header>

<div id="login-modal" class="modal">
    <div class="modal-content">
        <button class="close-btn">X</button>
        <div class="tab-buttons">
            <button id="login-tab" class="active">Đăng nhập</button>
            <button id="register-tab">Đăng ký</button>
        </div>
        <div id="login-form">
            <h2>Đăng nhập</h2>
            <input type="text" placeholder="Tên đăng nhập" class="w-full px-2 py-1 border">
            <input type="password" placeholder="Mật khẩu" class="w-full px-2 py-1 border mt-2">
            <button class="bg-blue-600 text-white px-4 py-2 mt-2">Đăng nhập</button>
        </div>
        <div id="register-form" class="hidden">
            <h2>Đăng ký</h2>
            <input type="text" placeholder="Tên đăng nhập" class="w-full px-2 py-1 border">
            <input type="password" placeholder="Mật khẩu" class="w-full px-2 py-1 border mt-2">
            <input type="password" placeholder="Nhập lại mật khẩu" class="w-full px-2 py-1 border mt-2">
            <button class="bg-green-600 text-white px-4 py-2 mt-2">Đăng ký</button>
        </div>
    </div>
</div>

<script>
    $(document).ready(function() {
        $("#user-icon").click(function() {
            $("#login-modal").fadeIn().css("display", "flex");
        });
        $(".close-btn").click(function() {
            $("#login-modal").fadeOut();
        });

        $("#login-tab").click(function() {
            $("#register-form").hide();
            $("#login-form").show();
            $("#register-tab").removeClass("active");
            $("#login-tab").addClass("active");
        });

        $("#register-tab").click(function() {
            $("#login-form").hide();
            $("#register-form").show();
            $("#login-tab").removeClass("active");
            $("#register-tab").addClass("active");
        });
    });
</script>
</body>
</html>
