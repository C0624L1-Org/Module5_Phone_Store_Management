<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Thêm Khách Hàng</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="path/to/your/styles.css"/>
</head>
<body class="bg-gray-100">
<div th:replace="oldcommon/header.html"></div>


<div class="bg-gray-200 py-2">
  <h2 class="text-lg font-bold">Thêm Khách Hàng</h2>

  <form action="/customers/create" method="post">
    <div>
      <label for="full-name">Họ tên:</label>
      <input type="text" id="full-name" name="fullName" class="border border-gray-300 rounded px-2 py-1" required/>
    </div>
    <div>
      <label for="dob">Ngày sinh:</label>
      <input type="date" id="dob" name="dob" class="border border-gray-300 rounded px-2 py-1" required/>
    </div>
    <div>
      <label for="phone">Số điện thoại:</label>
      <input type="text" id="phone" name="phone" class="border border-gray-300 rounded px-2 py-1" required/>
    </div>
    <div>
      <label for="address">Địa chỉ:</label>
      <input type="text" id="address" name="address" class="border border-gray-300 rounded px-2 py-1"/>
    </div>
    <div>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" class="border border-gray-300 rounded px-2 py-1" required/>
    </div>
    <div>
      <label for="gender">Giới tính:</label>
      <select id="gender" name="gender" class="border border-gray-300 rounded px-2 py-1">
        <option value="Male">Nam</option>
        <option value="Female">Nữ</option>
        <option value="Other">Khác</option>
      </select>
    </div>
    <input type="hidden" name="purchaseCount" value="0"/>
    <button type="submit" class="bg-blue-600 text-white py-1 px-2 rounded">Thêm mới</button>
  </form>
</div>

<div th:replace="oldcommon/footer.html"></div>
</body>
</html>
